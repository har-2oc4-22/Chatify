services:
  - type: web
    name: chatify-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false      # Set this in Render Dashboard → Environment
      - key: JWT_SECRET
        sync: false      # Set this in Render Dashboard → Environment
      - key: CLOUD_NAME
        sync: false      # Set this in Render Dashboard → Environment
      - key: API_KEY
        sync: false      # Set this in Render Dashboard → Environment
      - key: API_SECRET
        sync: false      # Set this in Render Dashboard → Environment
      - key: CLIENT_URL
        sync: false      # Set to your Vercel URL, e.g. https://connectify.vercel.app
